name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android @capacitor/app
          npx cap init MyWebApp com.myweb.app --web-dir=.
          npx cap add android
          cp -r ./* android/app/src/main/assets/public/ 2>/dev/null || true
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
